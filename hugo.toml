baseURL = "https://lpeasy.github.io/outsideinprint/"
title = "Outside In Print"
languageCode = "en-us"

enableRobotsTXT = true
disableKinds = ["taxonomy", "term"]

[permalinks]
essays = "/essays/:slug/"
literature = "/literature/:slug/"
syd-and-oliver = "/syd-and-oliver/:slug/"
working-papers = "/working-papers/:slug/"
collections = "/collections/:slug/"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[security]
  [security.funcs]
    getenv = ['^HUGO_', '^CI$', '^ANALYTICS_', '^GOATCOUNTER_']

[params.newsletter]
provider = "buttondown"
# Set this to your real Buttondown username to enable the signup form.
buttondown_username = "OutsideInPrint"
tag = "outside-in-print"

[params.analytics]
enabled = false
allow_local = false

[params.analytics.goatcounter]
site_url = "https://outsideinprint.goatcounter.com"
script_src = "https://gc.zgo.at/count.v5.js"
script_integrity = "sha384-atnOLvQb9t+jTSipvd75X2yginT4PjVbqDdlJAmxMm+wYElFmeR6EmLP5bYeoRVQ"
script_crossorigin = "anonymous"
