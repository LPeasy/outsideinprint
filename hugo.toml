baseURL = "https://lpeasy.github.io/outsideinprint/"
title = "Outside In Print"
languageCode = "en-us"

enableRobotsTXT = true
disableKinds = ["taxonomy", "term"]

[permalinks]
essays = "/essays/:slug/"
literature = "/literature/:slug/"
syd-and-oliver = "/syd-and-oliver/:slug/"
working-papers = "/working-papers/:slug/"
collections = "/collections/:slug/"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = false

[security]
  [security.funcs]
    getenv = ['^HUGO_', '^CI$', '^ANALYTICS_', '^PLAUSIBLE_']

[params.newsletter]
provider = "buttondown"
# Set this to your real Buttondown username to enable the signup form.
buttondown_username = "OutsideInPrint"
tag = "outside-in-print"

[params.analytics]
enabled = false
allow_local = false

[params.analytics.plausible]
domain = ""
script_src = "https://plausible.io/js/script.js"
api_host = "https://plausible.io"
