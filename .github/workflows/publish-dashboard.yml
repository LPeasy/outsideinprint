name: Build And Publish Dashboard

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/publish-dashboard.yml"
      - "assets/css/**"
      - "assets/js/**"
      - "content-dashboard/**"
      - "data/analytics/**"
      - "docs/analytics-system.md"
      - "hugo-dashboard.toml"
      - "layouts/_default/baseof.html"
      - "layouts/dashboard/**"
      - "layouts/index.html"
      - "layouts/partials/analytics.html"
      - "layouts/partials/dashboard/**"
      - "layouts/partials/footer_dashboard.html"
      - "layouts/partials/head_fonts.html"
      - "layouts/partials/masthead_dashboard.html"
      - "scripts/import_analytics.ps1"
      - "tests/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    # The dashboard is published from a separate repo so the public reading site never exposes /dashboard/.
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Source Repo
        uses: actions/checkout@v4

      - name: Verify Dashboard Deploy Key
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${DASHBOARD_DEPLOY_KEY:-}" ]; then
            echo "DASHBOARD_DEPLOY_KEY is not configured."
            echo "Add the private SSH deploy key for LPeasy/OutsideInPrintDashboard as a repository secret."
            exit 1
          fi
        env:
          DASHBOARD_DEPLOY_KEY: ${{ secrets.DASHBOARD_DEPLOY_KEY }}

      - name: Configure SSH For Dashboard Publish
        shell: bash
        run: |
          set -euo pipefail
          # Use a repo-scoped deploy key instead of a broader personal access token.
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${DASHBOARD_DEPLOY_KEY}" > ~/.ssh/dashboard_deploy_key
          chmod 600 ~/.ssh/dashboard_deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          cat <<'EOF' > ~/.ssh/config
          Host github.com
            IdentityFile ~/.ssh/dashboard_deploy_key
            IdentitiesOnly yes
            StrictHostKeyChecking yes
            UserKnownHostsFile ~/.ssh/known_hosts
          EOF
          chmod 600 ~/.ssh/config
        env:
          DASHBOARD_DEPLOY_KEY: ${{ secrets.DASHBOARD_DEPLOY_KEY }}

      - name: Setup Hugo (extended)
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: "0.157.0"
          extended: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate Committed Analytics Snapshot Contract
        shell: pwsh
        run: ./tests/test_analytics_snapshot_contract.ps1

      - name: Run Dashboard Logic Tests
        shell: bash
        run: node --test tests/*.test.mjs

      - name: Run Analytics Import Test
        shell: pwsh
        run: ./tests/test_analytics_import.ps1

      - name: Run Analytics Snapshot Contract Test
        shell: pwsh
        run: ./tests/test_analytics_snapshot_contract.ps1

      - name: Run Dashboard Build Smoke Tests
        shell: pwsh
        run: ./tests/test_dashboard_build.ps1

      - name: Build Dashboard Site
        run: hugo --config hugo-dashboard.toml --gc --minify --destination .dashboard-public

      - name: Prepare Publish Repo
        shell: bash
        run: |
          set -euo pipefail
          # Publish into the generated-output repo over SSH using the matching writable deploy key.
          git clone git@github.com:LPeasy/OutsideInPrintDashboard.git .dashboard-repo
          cd .dashboard-repo
          if git show-ref --verify --quiet refs/remotes/origin/main; then
            git checkout -B main origin/main
          else
            git checkout -B main
          fi

      - name: Sync Built Files
        shell: bash
        run: |
          set -euo pipefail
          # The target repository is generated output only.
          # Each successful build replaces the published site contents while preserving .git metadata.
          find .dashboard-repo -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -R .dashboard-public/. .dashboard-repo/
          touch .dashboard-repo/.nojekyll

      - name: Commit And Push
        shell: bash
        run: |
          set -euo pipefail
          cd .dashboard-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet --exit-code; then
            echo "No dashboard changes to publish."
            exit 0
          fi
          git commit -m "Publish dashboard snapshot"
          # Normal push is enough here because this workflow starts from the current remote main branch.
          # If the target repo changes unexpectedly, a non-fast-forward failure is safer than overwriting it.
          git push origin HEAD:main
