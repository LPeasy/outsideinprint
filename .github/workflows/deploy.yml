name: Build PDFs, Build Hugo, Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      HUGO_ENVIRONMENT: production
      ANALYTICS_ENABLED: ${{ vars.ANALYTICS_ENABLED }}
      ANALYTICS_ALLOW_LOCAL: ${{ vars.ANALYTICS_ALLOW_LOCAL }}
      PLAUSIBLE_DOMAIN: ${{ vars.PLAUSIBLE_DOMAIN }}
      PLAUSIBLE_SCRIPT_SRC: ${{ vars.PLAUSIBLE_SCRIPT_SRC }}
      PLAUSIBLE_API_HOST: ${{ vars.PLAUSIBLE_API_HOST }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Setup Typst
        uses: typst-community/setup-typst@v4

      - name: Install Pandoc
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pandoc

      - name: Verify Toolchain
        shell: bash
        run: |
          set -euo pipefail
          typst --version
          pandoc --version | head -n 2

      - name: Build PDF Editions (Typst)
        shell: pwsh
        run: |
          ./scripts/build_pdfs_typst_ci.ps1

      - name: Preflight Validation
        shell: pwsh
        run: |
          ./scripts/preflight.ps1

      - name: Setup Hugo (extended)
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: '0.157.0'
          extended: true

      - name: Build Hugo
        run: hugo --gc --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
