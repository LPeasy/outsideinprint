name: Build PDFs, Build Hugo, Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      HUGO_ENVIRONMENT: production
      ANALYTICS_ENABLED: ${{ vars.ANALYTICS_ENABLED }}
      ANALYTICS_ALLOW_LOCAL: ${{ vars.ANALYTICS_ALLOW_LOCAL }}
      GOATCOUNTER_SITE_URL: ${{ vars.GOATCOUNTER_SITE_URL }}
      GOATCOUNTER_SCRIPT_SRC: ${{ vars.GOATCOUNTER_SCRIPT_SRC }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Typst
        uses: typst-community/setup-typst@v4

      - name: Setup Hugo (extended)
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.157.0'
          extended: true

      - name: Install Pandoc
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pandoc

      - name: Install Node dependencies
        shell: bash
        run: |
          set -euo pipefail
          npm install
          npx playwright install --with-deps chromium

      - name: Verify Toolchain
        shell: bash
        run: |
          set -euo pipefail
          node --version
          npm --version
          typst --version
          hugo version
          pandoc --version | head -n 2

      - name: Build PDF Editions
        shell: pwsh
        run: |
          ./scripts/build_pdfs_typst_ci.ps1

      - name: Verify PDF Pipeline
        shell: pwsh
        run: |
          ./scripts/verify_pdf_pipeline.ps1

      - name: Audit PDF Failures
        id: pdf_audit
        continue-on-error: true
        shell: pwsh
        run: |
          ./scripts/audit_pdf_failures.ps1

      - name: Test PDF Failure Audit
        shell: pwsh
        run: |
          ./tests/test_pdf_failure_audit.ps1

      - name: Test PDF Builder Static Image Paths
        shell: pwsh
        run: |
          ./tests/test_pdf_builder_static_image_paths.ps1

      - name: Preflight Validation
        shell: pwsh
        run: |
          ./scripts/preflight.ps1

      - name: Summarize PDF audit
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.pdf_audit.outcome }}" = "success" ]; then
            echo "PDF audit passed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "PDF audit reported pipeline regressions. See the uploaded pdf-failure-audit artifact." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload PDF audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pdf-failure-audit
          path: |
            ./reports/pdf-failure-audit.json
            ./reports/pdf-failure-audit.md

      - name: Build Hugo
        run: hugo --gc --minify

      - name: Test Public HTML Output
        shell: pwsh
        run: |
          ./tests/test_public_html_output.ps1

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
