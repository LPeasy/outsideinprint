name: Build Hugo, Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Test CI Contract
        shell: pwsh
        run: |
          ./tests/test_ci_contract.ps1

      - name: Test Essay Guardrails
        shell: pwsh
        run: |
          ./tests/test_essay_guardrails.ps1

      - name: Test Schema Template Contract
        shell: pwsh
        run: |
          ./tests/test_schema_template_contract.ps1

      - name: Test Author Directory Contract
        shell: pwsh
        run: |
          ./tests/test_author_directory_contract.ps1

      - name: Test Indexation Policy Contract
        shell: pwsh
        run: |
          ./tests/test_indexation_policy_contract.ps1

      - name: Test Discovery Surface Contract
        shell: pwsh
        run: |
          ./tests/test_discovery_surface_contract.ps1

      - name: Test Legacy Render Contract
        shell: pwsh
        run: |
          ./tests/test_legacy_render_contract.ps1

      - name: Check Essay Guardrails
        shell: pwsh
        run: |
          $base = "${{ github.event.before }}"
          if ([string]::IsNullOrWhiteSpace($base) -or ($base -match '^0+$')) {
            $base = (git rev-parse HEAD^ 2>$null)
          }

          if ([string]::IsNullOrWhiteSpace($base)) {
            ./scripts/check_essay_guardrails.ps1 -RequireDescription
          }
          else {
            ./scripts/check_essay_guardrails.ps1 -BaseRef $base -HeadRef "${{ github.sha }}" -RequireDescription
          }

  build:
    runs-on: ubuntu-latest
    needs: contracts
    timeout-minutes: 10
    env:
      HUGO_ENVIRONMENT: production
      ANALYTICS_ENABLED: ${{ vars.ANALYTICS_ENABLED }}
      ANALYTICS_ALLOW_LOCAL: ${{ vars.ANALYTICS_ALLOW_LOCAL }}
      GOATCOUNTER_SITE_URL: ${{ vars.GOATCOUNTER_SITE_URL }}
      GOATCOUNTER_SCRIPT_SRC: ${{ vars.GOATCOUNTER_SCRIPT_SRC }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Setup Hugo (extended)
        shell: bash
        run: |
          set -euo pipefail
          version="0.157.0"
          tools_dir="${RUNNER_TEMP}/hugo-${version}"
          archive_path="${RUNNER_TEMP}/hugo_extended_${version}_linux-amd64.tar.gz"
          download_url="https://github.com/gohugoio/hugo/releases/download/v${version}/hugo_extended_${version}_linux-amd64.tar.gz"
          rm -rf "${tools_dir}"
          mkdir -p "${tools_dir}"
          curl -fL --retry 5 --retry-all-errors --retry-delay 5 -o "${archive_path}" "${download_url}"
          tar -xzf "${archive_path}" -C "${tools_dir}"
          echo "${tools_dir}" >> "${GITHUB_PATH}"
          "${tools_dir}/hugo" version

      - name: Verify Toolchain
        shell: bash
        run: |
          set -euo pipefail
          hugo version

      - name: Build Hugo
        run: hugo --gc --minify

      - name: Remove public PDF artifacts
        shell: bash
        run: |
          set -euo pipefail
          rm -rf ./public/pdfs

      - name: Write Public Build Manifest
        shell: pwsh
        run: |
          ./tests/write_public_build_manifest.ps1

      - name: Test Public Route Smoke
        shell: pwsh
        run: |
          ./tests/test_public_route_smoke.ps1

      - name: Test Public HTML Output
        shell: pwsh
        run: |
          ./tests/test_public_html_output.ps1 -RequireFreshBuild

      - name: Show Public Route Debug
        if: failure()
        shell: pwsh
        run: |
          ./tests/show_public_route_debug.ps1

      - name: Upload Public Route Debug Artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: public-route-debug
          if-no-files-found: warn
          path: |
            public/authors/**
            public/about/**
            public/random/**
            public/.oip-build-manifest.json

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Wait for Pages propagation
        shell: bash
        run: sleep 20

      - name: Live SEO Smoke Test
        shell: pwsh
        run: |
          ./tests/test_live_seo_smoke.ps1 -BaseUrl "${{ steps.deployment.outputs.page_url }}"
