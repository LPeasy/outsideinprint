name: Build Hugo, Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      HUGO_ENVIRONMENT: production
      ANALYTICS_ENABLED: ${{ vars.ANALYTICS_ENABLED }}
      ANALYTICS_ALLOW_LOCAL: ${{ vars.ANALYTICS_ALLOW_LOCAL }}
      GOATCOUNTER_SITE_URL: ${{ vars.GOATCOUNTER_SITE_URL }}
      GOATCOUNTER_SCRIPT_SRC: ${{ vars.GOATCOUNTER_SCRIPT_SRC }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Setup Hugo (extended)
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.157.0"
          extended: true

      - name: Test CI Contract
        shell: pwsh
        run: |
          ./tests/test_ci_contract.ps1

      - name: Verify Toolchain
        shell: bash
        run: |
          set -euo pipefail
          hugo version

      - name: Build Hugo
        run: hugo --gc --minify

      - name: Remove public PDF artifacts
        shell: bash
        run: |
          set -euo pipefail
          rm -rf ./public/pdfs

      - name: Test Public HTML Output
        shell: pwsh
        run: |
          ./tests/test_public_html_output.ps1

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
