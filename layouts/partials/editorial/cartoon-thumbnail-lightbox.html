<div class="cartoon-lightbox" data-essay-cartoon-lightbox aria-hidden="true" hidden>
  <button
    type="button"
    class="cartoon-lightbox__backdrop"
    data-essay-cartoon-lightbox-close
    aria-label="Close cartoon viewer"
  ></button>
  <section class="cartoon-lightbox__dialog" role="dialog" aria-modal="true" aria-labelledby="essay-cartoon-lightbox-title">
    <button
      type="button"
      class="cartoon-lightbox__close"
      data-essay-cartoon-lightbox-close
      aria-label="Close cartoon viewer"
    ><span aria-hidden="true">&times;</span></button>
    <figure class="cartoon-lightbox__figure">
      <button
        type="button"
        class="cartoon-lightbox__image-button"
        data-essay-cartoon-lightbox-image-button
        aria-label="Close fullscreen cartoon"
      >
        <img data-essay-cartoon-lightbox-image src="" alt="">
      </button>
      <figcaption class="cartoon-lightbox__caption">
        <div>
          <h2 id="essay-cartoon-lightbox-title" data-essay-cartoon-lightbox-title></h2>
          <time data-essay-cartoon-lightbox-date></time>
        </div>
        <a class="cartoon-lightbox__essay" data-essay-cartoon-lightbox-gallery href="#" hidden>View in gallery</a>
      </figcaption>
    </figure>
  </section>
</div>

<script>
  (function () {
    var lightbox = document.querySelector("[data-essay-cartoon-lightbox]");
    if (!lightbox) return;

    var title = lightbox.querySelector("[data-essay-cartoon-lightbox-title]");
    var date = lightbox.querySelector("[data-essay-cartoon-lightbox-date]");
    var image = lightbox.querySelector("[data-essay-cartoon-lightbox-image]");
    var imageButton = lightbox.querySelector("[data-essay-cartoon-lightbox-image-button]");
    var galleryLink = lightbox.querySelector("[data-essay-cartoon-lightbox-gallery]");
    var closeButton = lightbox.querySelector(".cartoon-lightbox__close");
    var closeControls = Array.prototype.slice.call(lightbox.querySelectorAll("[data-essay-cartoon-lightbox-close]"));
    var triggers = Array.prototype.slice.call(document.querySelectorAll("[data-essay-cartoon-lightbox-trigger]"));
    var activeTrigger = null;

    if (!triggers.length) return;

    function focusableElements() {
      return Array.prototype.slice.call(lightbox.querySelectorAll("button:not([disabled]), a[href]")).filter(function (element) {
        var style = window.getComputedStyle(element);
        return !element.hidden && style.display !== "none" && style.visibility !== "hidden";
      });
    }

    function closeLightbox() {
      lightbox.hidden = true;
      lightbox.setAttribute("aria-hidden", "true");
      document.body.classList.remove("cartoon-lightbox-open");
      image.removeAttribute("src");
      image.removeAttribute("width");
      image.removeAttribute("height");
      galleryLink.hidden = true;
      galleryLink.removeAttribute("href");

      if (activeTrigger) {
        activeTrigger.focus({ preventScroll: true });
        activeTrigger = null;
      }
    }

    function openLightbox(trigger) {
      var imageTitle = trigger.getAttribute("data-title") || "";
      var gallery = trigger.getAttribute("data-gallery") || "";
      activeTrigger = trigger;

      title.textContent = imageTitle;
      date.textContent = trigger.getAttribute("data-date-label") || "";
      date.setAttribute("datetime", trigger.getAttribute("data-date") || "");
      image.src = trigger.getAttribute("data-image") || "";
      image.alt = trigger.getAttribute("data-alt") || "";
      image.width = Number(trigger.getAttribute("data-width") || 0);
      image.height = Number(trigger.getAttribute("data-height") || 0);

      if (gallery) {
        galleryLink.href = gallery;
        galleryLink.hidden = false;
      } else {
        galleryLink.hidden = true;
        galleryLink.removeAttribute("href");
      }

      imageButton.setAttribute("aria-label", "Close fullscreen cartoon: " + imageTitle);
      lightbox.hidden = false;
      lightbox.setAttribute("aria-hidden", "false");
      document.body.classList.add("cartoon-lightbox-open");
      closeButton.focus({ preventScroll: true });
    }

    triggers.forEach(function (trigger) {
      trigger.addEventListener("click", function () {
        openLightbox(trigger);
      });
    });

    closeControls.forEach(function (control) {
      control.addEventListener("click", closeLightbox);
    });

    imageButton.addEventListener("click", closeLightbox);

    document.addEventListener("keydown", function (event) {
      var focusable;
      var first;
      var last;

      if (lightbox.hidden) return;

      if (event.key === "Escape") {
        event.preventDefault();
        closeLightbox();
        return;
      }

      if (event.key !== "Tab") return;

      focusable = focusableElements();
      if (!focusable.length) return;

      first = focusable[0];
      last = focusable[focusable.length - 1];

      if (event.shiftKey && document.activeElement === first) {
        event.preventDefault();
        last.focus();
      } else if (!event.shiftKey && document.activeElement === last) {
        event.preventDefault();
        first.focus();
      }
    });
  })();
</script>
