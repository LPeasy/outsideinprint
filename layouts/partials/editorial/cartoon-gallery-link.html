{{- $page := .page -}}
{{- $cartoon := .cartoon -}}
{{- $class := .class | default "" -}}
{{- with $cartoon -}}
  <button
    type="button"
    class="essay-cartoon-thumb{{ with $class }} {{ . }}{{ end }}"
    data-essay-cartoon-lightbox-trigger
    data-cartoon-slug="{{ .slug }}"
    data-title="{{ .title }}"
    data-date="{{ .date }}"
    data-date-label="{{ time.Format "Jan 2, 2006" .date }}"
    data-image="{{ .image | relURL }}"
    data-alt="{{ .alt }}"
    data-width="{{ .width }}"
    data-height="{{ .height }}"
    data-gallery="{{ (printf "gallery/?cartoon=%s" .slug) | absURL }}"
    aria-label="Open the cartoon for {{ $page.Title }} fullscreen"
  >
    <img src="{{ .image | relURL }}" alt="" width="{{ .width }}" height="{{ .height }}" loading="lazy">
    <span>Cartoon</span>
  </button>
{{- end -}}
