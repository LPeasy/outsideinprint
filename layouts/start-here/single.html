{{ define "main" }}
  <section class="start-here-page">
    <header class="start-here-header page-shell page-shell--wide">
      {{ with .Params.section_label }}<p class="start-here-kicker">{{ . }}</p>{{ end }}
      <h1>{{ .Title }}</h1>
      {{ with .Params.subtitle }}<p class="subtitle">{{ . }}</p>{{ end }}
      {{ with .Params.description }}<p class="page-intro">{{ . }}</p>{{ end }}
    </header>

    <article class="start-here-content page-shell page-shell--reading">
      {{ .Content }}
    </article>
  </section>
{{ end }}
