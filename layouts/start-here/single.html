{{ define "main" }}
  <section class="single-page start-here-page">
    <header class="start-here-header">
      {{ with .Params.section_label }}<p class="start-here-kicker">{{ . }}</p>{{ end }}
      <h1>{{ .Title }}</h1>
      {{ with .Params.subtitle }}<p class="subtitle">{{ . }}</p>{{ end }}
    </header>

    <article class="single-content start-here-content">
      {{ .Content }}
    </article>

    <p class="start-here-closing">Begin where the thread catches.</p>
  </section>
{{ end }}
