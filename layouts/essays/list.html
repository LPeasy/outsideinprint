<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Redirecting to Outside In Print Archive</title>
  <meta name="robots" content="noindex, follow" />
  <link rel="canonical" href="{{ "archive/" | absURL }}" />
  {{ with site.Home.OutputFormats.Get "RSS" }}
    <link rel="alternate" type="{{ .MediaType.Type }}" title="{{ site.Title }} RSS Feed" href="{{ .Permalink }}" />
  {{ end }}
  {{ with .OutputFormats.Get "RSS" }}
    <link rel="alternate" type="{{ .MediaType.Type }}" title="Essays RSS Feed" href="{{ .Permalink }}" />
  {{ end }}
  <meta http-equiv="refresh" content="0; url={{ "archive/" | relURL }}" />
  <script>
    window.location.replace("{{ "archive/" | relURL }}");
  </script>
</head>
<body>
  <p>Redirecting to <a href="{{ "archive/" | relURL }}">Archive</a>.</p>
</body>
</html>
